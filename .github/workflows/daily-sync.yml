name: Daily Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  TARGET_REPO: xkcoding/second-brain
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      count: ${{ steps.scan.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: scan
        name: Scan subscriptions
        run: |
          pnpm tsx src/index.ts matrix
          COUNT=$(pnpm tsx src/index.ts list | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

  sync:
    name: Sync ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout osmosis
        uses: actions/checkout@v4
        with:
          path: osmosis

      - name: Checkout second-brain
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.TARGET_REPO_PAT }}
          path: second-brain

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: osmosis/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: osmosis/pnpm-lock.yaml

      - name: Install
        working-directory: osmosis
        run: pnpm install --frozen-lockfile

      - name: Fetch subscription
        id: fetch
        working-directory: osmosis
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          TARGET_REPO: ${{ env.TARGET_REPO }}
          SUB_NAME: ${{ matrix.name }}
        run: pnpm tsx src/index.ts fetch --subscription "$SUB_NAME" --output-dir ../second-brain

      - name: Compute branch + title
        if: steps.fetch.outputs.has_new_content == 'true'
        id: meta
        env:
          SUB_NAME: ${{ matrix.name }}
          DATE: ${{ steps.fetch.outputs.date }}
        run: |
          echo "branch=auto-sync/${SUB_NAME}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "title=📡 ${SUB_NAME} ${DATE}" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.fetch.outputs.has_new_content == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          path: second-brain
          token: ${{ secrets.TARGET_REPO_PAT }}
          branch: ${{ steps.meta.outputs.branch }}
          title: ${{ steps.meta.outputs.title }}
          commit-message: "sync: ${{ matrix.name }} ${{ steps.fetch.outputs.date }}"
          labels: |
            auto-sync
            source:${{ matrix.name }}
            needs-review
          body: |
            自动同步自 [${{ matrix.name }}](${{ steps.fetch.outputs.source_url }})

            - 源: `${{ matrix.name }}`
            - 日期: `${{ steps.fetch.outputs.date }}`
            - 路径: `${{ steps.fetch.outputs.output_path }}`

  notify:
    name: Notify
    needs: [prepare, sync]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compute date
        id: date
        run: |
          D=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          echo "date=$D" >> "$GITHUB_OUTPUT"

      - name: Summarize
        id: summarize
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          TARGET_REPO: ${{ env.TARGET_REPO }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SUMMARY_MODEL: ${{ vars.SUMMARY_MODEL || 'MiniMax-M2.7-highspeed' }}
          DATE: ${{ steps.date.outputs.date }}
        run: pnpm tsx src/index.ts summarize --target-repo "$TARGET_REPO" --date "$DATE" --output summary.md

      - name: Dump summary for inspection
        if: steps.summarize.outputs.has_summary == 'true'
        run: |
          echo "::group::summary.md"
          cat summary.md
          echo "::endgroup::"

      - name: Upload summary artifact
        if: steps.summarize.outputs.has_summary == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ steps.date.outputs.date }}
          path: summary.md
          retention-days: 14

      - name: Notify
        if: steps.summarize.outputs.has_summary == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          TARGET_REPO: ${{ env.TARGET_REPO }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          DATE: ${{ steps.date.outputs.date }}
        run: pnpm tsx src/index.ts notify --target-repo "$TARGET_REPO" --date "$DATE"

  alert:
    name: Edge-triggered failure / recovery alert
    needs: [prepare, sync, notify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compute current state + lookup prior run
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          SYNC_RESULT: ${{ needs.sync.result }}
          NOTIFY_RESULT: ${{ needs.notify.result }}
        run: |
          if [ "$PREPARE_RESULT" = "failure" ] || [ "$SYNC_RESULT" = "failure" ] || [ "$NOTIFY_RESULT" = "failure" ]; then
            CURRENT="failure"
          else
            CURRENT="success"
          fi
          # Skip the in-progress current run; take the most recently completed one
          PRIOR=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow daily-sync.yml --status completed --limit 1 --json conclusion --jq '.[0].conclusion // "unknown"')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "prior=$PRIOR" >> "$GITHUB_OUTPUT"
          echo "state: prior=$PRIOR current=$CURRENT"

      - name: Alert on transition into failure
        if: steps.state.outputs.current == 'failure' && steps.state.outputs.prior != 'failure'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          SYNC_RESULT: ${{ needs.sync.result }}
          NOTIFY_RESULT: ${{ needs.notify.result }}
        run: |
          [ -z "$FEISHU_WEBHOOK_URL" ] && { echo "no webhook"; exit 0; }
          BODY=$(jq -nc \
            --arg text "❌ osmosis daily-sync 失败 (run ${GITHUB_RUN_ID})\nprepare: ${PREPARE_RESULT} | sync: ${SYNC_RESULT} | notify: ${NOTIFY_RESULT}\n${RUN_URL}" \
            '{msg_type:"text", content:{text:$text}}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$BODY" "$FEISHU_WEBHOOK_URL"

      - name: Alert on recovery
        if: steps.state.outputs.current == 'success' && steps.state.outputs.prior == 'failure'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$FEISHU_WEBHOOK_URL" ] && { echo "no webhook"; exit 0; }
          BODY=$(jq -nc \
            --arg text "✅ osmosis daily-sync 已恢复 (run ${GITHUB_RUN_ID})\n${RUN_URL}" \
            '{msg_type:"text", content:{text:$text}}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$BODY" "$FEISHU_WEBHOOK_URL"

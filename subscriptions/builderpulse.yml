  repo: BuilderPulse/BuilderPulse
  path: "zh/{year}/{date}.md"
  branch: main
  title: BuilderPulse Daily

summary:
  promptFile: prompts/builderpulse.md

output:
  obsidian:
    enabled: true
    path: "00_Inbox/Clippings/{date} - BuilderPulse Daily.md"
